  <!DOCTYPE html>
<html>

<head>

<title>Voter Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3a6073">
<link rel="manifest" href="/static/manifest.json">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(to right,#16222a,#3a6073);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

/* LOGIN CONTAINER */

.container{
background:white;
color:black;
width:420px;
max-width:95%;
padding:30px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
text-align:center;
}

/* TITLE */

h2{
margin-bottom:20px;
}

/* INPUT */

input{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

/* VIDEO */

video{
width:100%;
max-width:320px;
border-radius:6px;
border:2px solid #444;
}

/* BUTTONS */

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
transition:0.2s;
}

.capture{
background:#3498db;
color:white;
}

.login{
background:#2ecc71;
color:white;
}

.back{
background:#555;
color:white;
}

button:hover{
opacity:0.9;
}

/* MOBILE RESPONSIVE */

@media (max-width:768px){

.container{
padding:20px;
}

h2{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Voter Login</h2>

<form method="POST" action="/login">

<input type="email" name="email" placeholder="Enter Registered Email" required>

<h3>Face Verification</h3>

<video id="video" autoplay></video>

<br>

<button type="button" class="capture" onclick="capture()">Capture Face</button>

<canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

<input type="hidden" name="image" id="image_data">

<button type="submit" class="login">Verify & Continue</button>

</form>

<br>

<a href="/">
<button class="back">Back to Home</button>
</a>

</div>


<script>

/* CAMERA ACCESS */

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
video.srcObject = stream;
})
.catch(err => {
alert("Camera access denied!");
});

/* CAPTURE IMAGE */

function capture(){

const canvas = document.getElementById("canvas");
const context = canvas.getContext("2d");

canvas.width = 320;
canvas.height = 240;

context.drawImage(video,0,0,320,240);

// compress image
const image = canvas.toDataURL("image/jpeg",0.5);

document.getElementById("image_data").value = image;

alert("Face Captured Successfully");

}

/* SERVICE WORKER (PWA) */

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/static/service-worker.js')
.then(function(){
console.log("Service Worker Registered");
});
}

</script>

</body>

</html>
