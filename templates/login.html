<!DOCTYPE html>
<html>

<head>

<title>Voter Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3a6073">
<link rel="manifest" href="/static/manifest.json">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(to right,#16222a,#3a6073);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
background:white;
color:black;
width:420px;
max-width:95%;
padding:30px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

video, canvas{
width:100%;
max-width:320px;
border-radius:6px;
border:2px solid #444;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.capture{
background:#3498db;
color:white;
}

.login{
background:#2ecc71;
color:white;
}

.back{
background:#555;
color:white;
}

.preview{
margin-top:10px;
display:none;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h2>🔐 Voter Login</h2>

<form method="POST" action="/login" onsubmit="return validateLogin()">

<input type="email" name="email" placeholder="Enter Registered Email" required>

<h3>Face Verification</h3>

<video id="video" autoplay playsinline></video>

<button type="button" class="capture" onclick="capture()">📸 Capture Face</button>

<canvas id="canvas" style="display:none;"></canvas>

<img id="preview" class="preview">

<input type="hidden" name="image" id="image_data">

<button type="submit" class="login">Verify & Continue</button>

</form>

<br>

<a href="/">
<button class="back">⬅ Back to Home</button>
</a>

</div>

<script>

/* START CAMERA */

const video = document.getElementById("video");

async function startCamera(){

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:{
width:{ideal:320},
height:{ideal:240},
facingMode:"user"
}
});

video.srcObject = stream;

}catch(error){

alert("Camera access denied or not supported");
console.log(error);

}

}

startCamera();


/* CAPTURE FACE */

function capture(){

const canvas = document.getElementById("canvas");
const context = canvas.getContext("2d");

canvas.width = 320;
canvas.height = 240;

context.drawImage(video,0,0,320,240);

const image = canvas.toDataURL("image/jpeg",0.35);

document.getElementById("image_data").value = image;

/* preview */

const preview = document.getElementById("preview");
preview.src = image;
preview.style.display = "block";

alert("Face Captured Successfully");

}


/* PREVENT LOGIN WITHOUT FACE */

function validateLogin(){

const img = document.getElementById("image_data").value;

if(!img){

alert("Please capture your face first");

return false;

}

return true;

}


/* SERVICE WORKER */

if ('serviceWorker' in navigator) {

navigator.serviceWorker.register('/static/service-worker.js')
.then(()=>console.log("Service Worker Registered"));

}

</script>

</body>
</html>
