<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voting Page</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#2c3e50,#4ca1af);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
}

.container{
display:flex;
padding:30px;
gap:30px;
}

.user-card{
width:300px;
background:white;
color:black;
padding:20px;
border-radius:8px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.user-card img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
}

.candidate-section{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.candidate-card{
background:white;
color:black;
padding:20px;
border-radius:8px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.candidate-card img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
}

.symbol{
width:40px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
background:#27ae60;
color:white;
font-size:16px;
}

button:disabled{
background:gray;
cursor:not-allowed;
}
/* MOBILE RESPONSIVE */

@media (max-width:768px){

.container{
flex-direction:column;
width:95%;
}

.cards{
flex-direction:column;
}

.sidebar{
width:100%;
height:auto;
position:relative;
}

.content{
margin-left:0;
padding:15px;
}

table{
display:block;
overflow-x:auto;
}

button{
width:100%;
}

input{
width:100%;
}

}

</style>

</head>

<body>

<header>
🗳 Cast Your Vote
</header>

<div class="container">

<!-- USER PROFILE -->

<div class="user-card">

<img src="/{{user['photo']}}">

<h3>{{user['name']}}</h3>

<p>{{user['email']}}</p>

{% if user['has_voted']==1 %}
<p style="color:red;font-weight:bold;">You have already voted</p>
{% endif %}

</div>


<!-- CANDIDATES -->

<div class="candidate-section">

{% for c in candidates %}

<div class="candidate-card">

<img src="/{{c['photo']}}">

<h3>{{c['name']}}</h3>

<p>{{c['party']}}</p>

<img class="symbol" src="/{{c['symbol']}}">

<form action="/submit_vote" method="POST">

<input type="hidden" name="candidate" value="{{c['id']}}">
<input type="hidden" name="user_id" value="{{user['id']}}">

{% if user['has_voted']==1 %}

<button disabled>Already Voted</button>

{% else %}

<button>Vote</button>

{% endif %}

</form>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
