<!DOCTYPE html>
<html>

<head>

<title>Voting Page</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4ca1af">
<link rel="manifest" href="/static/manifest.json">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#2c3e50,#4ca1af);
color:white;
}

/* HEADER */

header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

/* MAIN CONTAINER */

.container{
display:flex;
padding:30px;
gap:30px;
flex-wrap:wrap;
}

/* USER PROFILE */

.user-card{
width:280px;
background:white;
color:black;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.user-card img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

/* CANDIDATE GRID */

.candidate-section{
flex:1;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CANDIDATE CARD */

.candidate-card{
background:white;
color:black;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.candidate-card img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
}

/* PARTY SYMBOL */

.symbol{
width:40px;
margin-top:10px;
}

/* BUTTON */

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
background:#27ae60;
color:white;
font-size:16px;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

button:disabled{
background:gray;
cursor:not-allowed;
}

/* MOBILE */

@media (max-width:768px){

.container{
flex-direction:column;
align-items:center;
padding:15px;
}

.user-card{
width:90%;
}

.candidate-section{
grid-template-columns:1fr;
}

button{
width:100%;
}

}

</style>

</head>

<body>

<header>
🗳 Cast Your Vote
</header>

<div class="container">

<!-- USER PROFILE -->

<div class="user-card">

<img src="/{{user['photo']}}">

<h3>{{user['name']}}</h3>

<p>{{user['email']}}</p>

{% if user['has_voted']==1 %}
<p style="color:red;font-weight:bold;">You have already voted</p>
{% endif %}

</div>

<!-- CANDIDATES -->

<div class="candidate-section">

{% for c in candidates %}

<div class="candidate-card">

<img src="/{{c['photo']}}">

<h3>{{c['name']}}</h3>

<p>{{c['party']}}</p>

<img class="symbol" src="/{{c['symbol']}}">

<form action="/submit_vote" method="POST">

<input type="hidden" name="candidate" value="{{c['id']}}">
<input type="hidden" name="user_id" value="{{user['id']}}">

{% if user['has_voted'] == 1 %}
<button disabled style="background:gray">Already Voted</button>
{% else %}
<button>Vote</button>
{% endif %}

</form>

</div>

{% endfor %}

</div>

</div>

<script>

/* PWA SERVICE WORKER */

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/static/service-worker.js')
.then(()=>console.log("Service Worker Registered"));
}

</script>

</body>
</html>
