<!DOCTYPE html>
<html>

<head>

<title>Smart Voting System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2c5364">
<link rel="manifest" href="/static/manifest.json">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
flex-wrap:wrap;
}

.title{
font-size:34px;
font-weight:bold;
}

/* MOBILE MENU BUTTON */

.menu-btn{
display:none;
background:none;
border:none;
font-size:26px;
color:white;
cursor:pointer;
}

/* TOP BUTTONS */

.top-buttons{
display:flex;
}

.top-buttons a{
text-decoration:none;
}

.top-buttons button{
padding:10px 18px;
margin-left:10px;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

.result{
background:#f39c12;
color:white;
}

.admin{
background:#e74c3c;
color:white;
}

/* CENTER BOX */

.center-box{
height:75vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.center-box button{
width:260px;
padding:16px;
margin:12px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.register{
background:#2ecc71;
color:white;
}

.login{
background:#3498db;
color:white;
}

button:hover{
transform:scale(1.05);
}

/* FOOTER */

footer{
text-align:center;
padding:10px;
font-size:14px;
}

/* MOBILE RESPONSIVE */

@media (max-width:768px){

header{
flex-direction:column;
align-items:flex-start;
padding:15px;
}

.title{
font-size:26px;
margin-bottom:10px;
}

.menu-btn{
display:block;
margin-bottom:10px;
}

.top-buttons{
display:none;
flex-direction:column;
width:100%;
}

.top-buttons button{
width:100%;
margin:5px 0;
}

.center-box button{
width:90%;
}

}

</style>

</head>


<body>

<header>

<div class="title">
🗳 Smart Voting System
</div>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="top-buttons" id="menu">

<a href="/result">
<button class="result">Results</button>
</a>

<a href="/admin">
<button class="admin">Admin</button>
</a>

</div>

</header>


<div class="center-box">

<a href="/register">
<button class="register">Register Voter</button>
</a>

<a href="/login">
<button class="login">Login & Vote</button>
</a>

<button id="installBtn" class="install" style="display:none;background:#ff9800;color:white;">
📲 Install App
</button>

</div>

<footer>
Secure Online Election Platform | Developed by Rahul Sharma | 2026
</footer>


<script>

/* MOBILE MENU */

function toggleMenu(){

var menu = document.getElementById("menu");

if(menu.style.display === "flex"){
menu.style.display = "none";
}else{
menu.style.display = "flex";
}

}

/* SERVICE WORKER FOR PWA */

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/static/service-worker.js')
.then(function(){
console.log("Service Worker Registered");
});
}

</script>

<script>

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {

e.preventDefault();

deferredPrompt = e;

document.getElementById("installBtn").style.display = "block";

});

document.getElementById("installBtn").addEventListener("click", async () => {

if (deferredPrompt) {

deferredPrompt.prompt();

const { outcome } = await deferredPrompt.userChoice;

console.log(`User response: ${outcome}`);

deferredPrompt = null;

}

});

</script>

</body>

</html>
