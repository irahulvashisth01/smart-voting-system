<!DOCTYPE html>
<html>

<head>

<title>Election Results</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1f4037">
<link rel="manifest" href="/static/manifest.json">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(to right,#1f4037,#99f2c8);
color:white;
text-align:center;
}

/* HEADER */

header{
font-size:34px;
padding:25px;
font-weight:bold;
}

/* RESULT CARDS */

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-top:30px;
}

.card{
background:white;
color:black;
width:240px;
padding:20px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.votes{
font-size:28px;
margin-top:10px;
font-weight:bold;
}

/* WINNER */

.winner{
margin-top:40px;
font-size:26px;
font-weight:bold;
color:yellow;
}

/* BUTTONS */

.buttons{
margin-top:40px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.stop{
background:#e74c3c;
color:white;
}

.download{
background:#3498db;
color:white;
}

.home{
background:#555;
color:white;
}

button:hover{
transform:scale(1.05);
}

/* CHART */

.chart-box{
width:90%;
max-width:600px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
}

/* MOBILE */

@media (max-width:768px){

header{
font-size:26px;
}

.container{
flex-direction:column;
align-items:center;
}

.card{
width:90%;
}

button{
width:90%;
}

}

</style>

</head>

<body>

<header>
📊 Election Results
</header>

<div class="container">

<div class="card">
<h3>Candidate A</h3>
<div class="votes">{{votes_a}}</div>
</div>

<div class="card">
<h3>Candidate B</h3>
<div class="votes">{{votes_b}}</div>
</div>

<div class="card">
<h3>Candidate C</h3>
<div class="votes">{{votes_c}}</div>
</div>

</div>

<div class="winner">
🏆 Winner: {{winner}}
</div>

<div class="chart-box">
<canvas id="resultChart"></canvas>
</div>

<div class="buttons">

<a href="/stop_election">
<button class="stop">Stop Election</button>
</a>

<a href="/download_result">
<button class="download">Download Result</button>
</a>

<a href="/">
<button class="home">Back to Home</button>
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const data = {
labels: {{ labels|safe }},
datasets: [{
label: 'Votes',
data: {{ votes|safe }},
backgroundColor: [
"#3498db",
"#2ecc71",
"#e74c3c",
"#9b59b6",
"#f1c40f"
]
}]
};

new Chart(document.getElementById('resultChart'),{
type:'bar',
data:data,
options:{
responsive:true,
plugins:{
legend:{display:false}
}
}
});

/* SERVICE WORKER */

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/static/service-worker.js')
.then(()=>console.log("Service Worker Registered"));
}

</script>

</body>
</html>
