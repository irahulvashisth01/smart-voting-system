<!DOCTYPE html>
<html>

<head>

<title>Voter Registration</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#243b55">
<link rel="manifest" href="/static/manifest.json">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(to right,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

/* CONTAINER */

.container{
background:white;
color:black;
width:420px;
max-width:95%;
padding:30px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
text-align:center;
}

/* TITLE */

h2{
margin-bottom:20px;
}

/* INPUT */

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

/* VIDEO */

video{
width:100%;
max-width:320px;
border-radius:6px;
border:2px solid #444;
}

/* BUTTONS */

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
transition:0.2s;
}

.capture{
background:#3498db;
color:white;
}

.register{
background:#2ecc71;
color:white;
}

.back{
background:#555;
color:white;
}

button:hover{
opacity:0.9;
}

/* MOBILE */

@media (max-width:768px){

.container{
padding:20px;
}

h2{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Voter Registration</h2>

<form method="POST" action="/register">

<input type="text" name="name" placeholder="Enter Full Name" required>

<input type="email" name="email" placeholder="Enter Email Address" required>

<h3>Face Verification</h3>

<video id="video" autoplay></video>

<br>

<button type="button" class="capture" onclick="capture()">Capture Face</button>

<canvas id="canvas" style="display:none;"></canvas>

<input type="hidden" name="image" id="image_data">

<button type="submit" class="register">Register Voter</button>

</form>

<br>

<a href="/">
<button class="back">Back to Home</button>
</a>

</div>

<script>

/* CAMERA */

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({ video:true })
.then(stream=>{
video.srcObject = stream;
})
.catch(()=>{
alert("Camera access denied!");
});

/* CAPTURE IMAGE */

<script>
function capture(){

const canvas = document.getElementById("canvas");
const context = canvas.getContext("2d");
const video = document.getElementById("video");

// small resolution
canvas.width = 320;
canvas.height = 240;

context.drawImage(video,0,0,320,240);

// compress image strongly
const image = canvas.toDataURL("image/jpeg",0.35);

document.getElementById("image_data").value = image;

alert("Face Captured Successfully");

}
</script>

/* PWA SERVICE WORKER */

if ('serviceWorker' in navigator){
navigator.serviceWorker.register('/static/service-worker.js')
.then(()=>{
console.log("Service Worker Registered");
});
}

</script>

</body>
</html>
